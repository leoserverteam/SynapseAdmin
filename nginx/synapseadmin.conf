server {
    listen 80;
    server_name synadmin.leonet.site;
    include snippets/force-https.conf;
}

server {
    listen 443 ssl; # Certbot добавит пути к сертификатам сам
    server_name synadmin.leonet.site;

    include snippets/authentikoutpost.conf;

    location / {
	include snippets/authentikcheck.conf;

        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    include snippets/authentikunauthorized.conf;
    include snippets/sslpath.conf;
}
